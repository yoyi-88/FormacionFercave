<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="/public/css/main.css ">
    <script type="module" src="/js/login.js" defer></script>
    <script src="/js/fecha-actual.js" defer></script>
</head>
<body class="pagina-login">
    <main class="contenedor-login">
        <div class="caja-login">
            <div class="img-login">
                <img src="/images/logoCompleto.png" alt="Logotipo Fercave Asesores">
            </div>

            <form class="form-login">
                <input type="email" id="username" placeholder="Nombre de usuario">
                <input type="password" id="password" placeholder="Contraseña">
                <button type="submit" class="btn-acceder">
                    Acceder
                </button>
            </form>
        </div>
    </main>
    <footer class="footer">
        <p></p>
        <nav>
            <a href="https://fercaveasesores.com/contacto/">Contacto</a>
            <a href="https://fercaveasesores.com/">Web Principal</a>
            <a href="https://fercaveasesores.es/politica-de-privacidad/">Política de privacidad</a>
        </nav>
    </footer>
</body>
</html>
